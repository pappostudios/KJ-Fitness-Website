<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KJ Fitness - דשבורד מאמנת</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{--primary:#00bcd4;--bg:#1a1a1a;--card:rgba(255,255,255,0.05);--border:rgba(0,188,212,0.3);}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Heebo',sans-serif;}
    body{background:var(--bg);color:#fff;min-height:100vh;}
    header{background:rgba(0,0,0,0.9);border-bottom:2px solid var(--primary);padding:14px 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .hdr-logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
    .hdr-logo img{height:40px;}
    .hdr-logo span{font-size:1.3rem;font-weight:700;color:var(--primary);}
    .hdr-right{display:flex;align-items:center;gap:16px;}
    .welcome{font-size:.95rem;color:#ccc;}
    .logout-btn{background:transparent;border:1px solid var(--primary);color:var(--primary);padding:8px 16px;border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.9rem;transition:all .3s;}
    .logout-btn:hover{background:var(--primary);color:#fff;}
    .main{padding:30px 5%;max-width:1200px;margin:0 auto;}
    .tabs-nav{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
    .tnav{background:var(--card);border:1px solid var(--border);color:#ccc;padding:10px 22px;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;transition:all .3s;}
    .tnav.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    h2{font-size:1.6rem;margin-bottom:22px;color:var(--primary);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;}
    .week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
    .day-card{background:rgba(0,188,212,0.08);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
    .day-card h4{color:var(--primary);margin-bottom:10px;font-size:1rem;}
    .day-card .slot-list{font-size:.85rem;color:#ccc;min-height:40px;}
    .day-card .slot{background:rgba(0,188,212,0.15);border-radius:5px;padding:4px 8px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;}
    .day-card .slot span{font-size:.8rem;}
    .del-slot{background:none;border:none;color:#ff7070;cursor:pointer;padding:0 4px;font-size:.9rem;}
    .add-slot-row{display:flex;gap:8px;margin-top:10px;}
    .add-slot-row select,.add-slot-row input{flex:1;padding:7px 10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-family:'Heebo',sans-serif;font-size:.85rem;}
    .add-slot-row button{padding:7px 12px;background:var(--primary);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:.85rem;font-family:'Heebo',sans-serif;}
    .client-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .client-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;}
    .client-card h4{color:var(--primary);margin-bottom:6px;}
    .client-card .useremail{font-size:.85rem;color:#aaa;margin-bottom:12px;}
    .msg-thread{max-height:200px;overflow-y:auto;margin-bottom:10px;padding:8px;background:rgba(0,0,0,0.3);border-radius:8px;}
    .msg-bubble{margin:5px 0;padding:8px 12px;border-radius:8px;font-size:.88rem;max-width:85%;}
    .msg-bubble.coach{background:rgba(0,188,212,0.25);margin-right:auto;}
    .msg-bubble.client{background:rgba(255,255,255,0.1);margin-left:auto;text-align:right;}
    .msg-meta{font-size:.72rem;color:#888;margin-top:2px;}
    .msg-compose{display:flex;gap:8px;}
    .msg-compose input{flex:1;padding:9px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;font-family:'Heebo',sans-serif;font-size:.9rem;}
    .msg-compose button{padding:9px 14px;background:var(--primary);border:none;border-radius:7px;color:#fff;cursor:pointer;font-family:'Heebo',sans-serif;}
    .empty-state{text-align:center;color:#666;padding:40px;font-size:1rem;}
    .badge{display:inline-block;background:var(--primary);color:#fff;border-radius:20px;padding:2px 10px;font-size:.78rem;margin-right:6px;}
    @media(max-width:600px){.main{padding:20px 4%;}.week-grid{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="hdr-logo" style="text-decoration:none;">
      <img src="kj fitness.jpg" alt="KJ" onerror="this.style.display='none'">
      <span>KJ FITNESS - מאמנת</span>
    </a>
    <div class="hdr-right">
      <span class="welcome" id="welcomeMsg"></span>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> יציאה</button>
    </div>
  </header>

  <div class="main">
    <div class="tabs-nav">
      <button class="tnav active" onclick="showTab('schedule',event)"><i class="fas fa-calendar-alt"></i> ניהול לוח זמנים</button>
      <button class="tnav" onclick="showTab('clients',event)"><i class="fas fa-users"></i> לקוחות והודעות</button>
    </div>

    <div id="tab-schedule" class="tab-content active">
      <h2>לוח זמנים שבועי</h2>
      <p style="color:#aaa;margin-bottom:20px;font-size:.95rem;">הוסיפי שעות פנויות לכל יום. הלקוחות יוכלו לראות את הזמינות שלך.</p>
      <div class="week-grid" id="weekGrid"></div>
    </div>

    <div id="tab-clients" class="tab-content">
      <h2>לקוחות והודעות</h2>
      <div id="clientList" class="client-list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, updateDoc, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const COACH_EMAILS = ['pappostudios@gmail.com', 'kjfitness.info@gmail.com'];
    function isCoach(email) { return COACH_EMAILS.includes(email.toLowerCase()); }

    const firebaseConfig = {
      apiKey: "AIzaSyBJDYiwXugrAaoOvoeuExHn_mMNgxN3Kpg",
      authDomain: "kj-fitness-80723.firebaseapp.com",
      projectId: "kj-fitness-80723",
      storageBucket: "kj-fitness-80723.firebasestorage.app",
      messagingSenderId: "525333297888",
      appId: "1:525333297888:web:7246851d44b70d9904ee85"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    var HOURS = [];
    for (var h = 6; h <= 22; h++) {
      HOURS.push((h<10?'0':'')+h+':00');
      HOURS.push((h<10?'0':'')+h+':30');
    }

    async function getSchedule() {
      const snap = await getDoc(doc(db, 'schedule', 'weekly'));
      return snap.exists() ? snap.data() : {};
    }
    async function saveSchedule(s) { await setDoc(doc(db, 'schedule', 'weekly'), s); }
    async function getClients() {
      const q = query(collection(db, 'users'), where('role', '==', 'client'));
      const snap = await getDocs(q);
      return snap.docs.map(d => d.data());
    }
    async function getMessages(clientUid) {
      const q = query(collection(db, 'messages'), where('clientUid', '==', clientUid), orderBy('timestamp', 'asc'));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    onAuthStateChanged(auth, async function(user) {
      if (!user || !isCoach(user.email)) {
        window.location.href = 'login.html';
        return;
      }
      const snap = await getDoc(doc(db, 'users', user.uid));
      const name = snap.exists() ? snap.data().name : user.displayName || user.email;
      document.getElementById('welcomeMsg').textContent = 'שלום, ' + name;
      await renderSchedule();
    });

    window.logout = async function() {
      sessionStorage.setItem('justLoggedOut', '1');
      await signOut(auth);
      window.location.href = 'index.html';
    };

    window.showTab = function(t, e) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tnav').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-'+t).classList.add('active');
      if (e && e.currentTarget) e.currentTarget.classList.add('active');
      if (t === 'clients') renderClients();
    };

    async function renderSchedule() {
      var sched = await getSchedule();
      var grid = document.getElementById('weekGrid');
      grid.innerHTML = '';
      DAYS.forEach(function(day) {
        var slots = sched[day] || [];
        var slotHtml = slots.length
          ? slots.map((slot,i) => '<div class="slot"><span>'+slot+'</span><button class="del-slot" onclick="delSlot(''+day+'','+i+')"><i class="fas fa-times"></i></button></div>').join('')
          : '<span style="color:#555;font-size:.8rem">אין שעות</span>';
        var optHtml = HOURS.map(h => '<option>'+h+'</option>').join('');
        var card = document.createElement('div');
        card.className = 'day-card';
        card.innerHTML = '<h4>'+day+'</h4><div class="slot-list">'+slotHtml+'</div><div class="add-slot-row"><select id="sel-'+day+'">'+optHtml+'</select><button onclick="addSlot(''+day+'')">הוסף</button></div>';
        grid.appendChild(card);
      });
    }

    window.addSlot = async function(day) {
      var sel = document.getElementById('sel-'+day);
      var time = sel.value;
      var sched = await getSchedule();
      if (!sched[day]) sched[day] = [];
      if (sched[day].indexOf(time) === -1) {
        sched[day].push(time);
        sched[day].sort();
        await saveSchedule(sched);
        await renderSchedule();
      }
    };

    window.delSlot = async function(day, idx) {
      var sched = await getSchedule();
      if (sched[day]) sched[day].splice(idx, 1);
      await saveSchedule(sched);
      await renderSchedule();
    };

    async function renderClients() {
      var clients = await getClients();
      var container = document.getElementById('clientList');
      if (!clients.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash" style="font-size:2rem;color:#555;display:block;margin-bottom:12px"></i>אין לקוחות רשומים עדיין</div>';
        return;
      }
      container.innerHTML = '';
      for (var u of clients) {
        var thread = await getMessages(u.uid);
        var unread = thread.filter(m => m.from === 'client' && !m.readByCoach).length;
        var threadHtml = thread.length
          ? thread.map(m => {
              var ic = m.from === 'coach';
              var time = m.timestamp ? new Date(m.timestamp).toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}) : '';
              return '<div class="msg-bubble '+(ic?'coach':'client')+'">'+m.text+'<div class="msg-meta">'+(ic?'מאמנת':'לקוח/ה')+' &bull; '+time+'</div></div>';
            }).join('')
          : '<div style="color:#555;font-size:.85rem;text-align:center;padding:8px">אין הודעות</div>';
        var card = document.createElement('div');
        card.className = 'client-card';
        card.innerHTML = '<h4>'+u.name+(unread?'&nbsp;<span class="badge">'+unread+' חדש</span>':'')+'</h4>'
          +'<div class="useremail">'+u.email+'</div>'
          +'<div class="msg-thread" id="thr-'+u.uid+'">'+threadHtml+'</div>'
          +'<div class="msg-compose"><input id="ci-'+u.uid+'" type="text" placeholder="כתבי הודעה ללקוח..."><button onclick="sendTo(''+u.uid+'')"><i class="fas fa-paper-plane"></i></button></div>';
        container.appendChild(card);
        for (var m of thread) {
          if (m.from === 'client' && !m.readByCoach) {
            await updateDoc(doc(db, 'messages', m.id), { readByCoach: true });
          }
        }
        setTimeout(((uid) => () => { var t = document.getElementById('thr-'+uid); if(t) t.scrollTop = t.scrollHeight; })(u.uid), 50);
      }
    }

    window.sendTo = async function(clientUid) {
      var input = document.getElementById('ci-'+clientUid);
      var text = input.value.trim();
      if (!text) return;
      await addDoc(collection(db, 'messages'), {
        clientUid: clientUid,
        from: 'coach',
        text: text,
        timestamp: Date.now(),
        readByClient: false,
        readByCoach: true
      });
      input.value = '';
      await renderClients();
    };
  </script>
</body>
</html>
